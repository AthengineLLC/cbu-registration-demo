<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CBU app piece</title>

<!--
  This links the real athengine stylesheet. Every class you use from
  CHEATSHEET.md renders exactly as it does in the product.

  Do not add a <style> block. Do not use hex colors. Do not copy CSS in here.
  If you need something the cheatsheet does not have, build the closest thing
  from what is there and leave a <!-- NEEDS: ... --> marker.
-->
<link rel="stylesheet" href="https://cbu.athengine.com/proto.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Font wiring and page padding only. This is the one allowed style block.
     Do not add anything else to it. */
  :root {
    --font-display-loaded: "Barlow Condensed";
    --font-body-loaded: "Inter";
  }
  .proto-page { padding: 32px 24px 96px; }
  .proto-page > * + * { margin-top: 24px; }
</style>
</head>
<body>

<main class="proto-page">

  <h1>Page title</h1>

  <section class="ui-card ui-card--pad-default">
    <header class="ui-card__header">Replace me</header>
    <p>Build the piece here using only classes from CHEATSHEET.md.</p>
  </section>

</main>

</body>
</html>
