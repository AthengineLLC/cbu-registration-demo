<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CBU app piece</title>

<!--
  This links the real athengine stylesheet. Every class you use from
  CHEATSHEET.md renders exactly as it does in the product.

  Use the cheatsheet's components where they exist. If you need something it
  does not have, build it: put the CSS in the data-new-components block below
  and comment the component at its first use in the body.
-->
<link rel="stylesheet" href="https://cbu.athengine.com/proto.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Page scaffolding. Leave this alone. */
  :root {
    --font-display-loaded: "Barlow Condensed";
    --font-body-loaded: "Inter";
  }
  .proto-page { padding: 32px 24px 96px; }
  .proto-page > * + * { margin-top: 24px; }
</style>

<style data-new-components>
  /* Anything the design system does not have yet goes here, and ONLY here.
     One short comment per component saying what it is. Use var(--token)
     colors, never hex. Do not prefix new classes with ui-.

     Example:
     .wizard-steps { ... }   numbered progress banner for multi-step forms
  */
</style>
</head>
<body>

<main class="proto-page">

  <h1>Page title</h1>

  <section class="ui-card ui-card--pad-default">
    <header class="ui-card__header">Replace me</header>
    <p>Build the piece here. Use CHEATSHEET.md components where they fit, build
       what you need where they do not.</p>
  </section>

</main>

</body>
</html>
