  delete applyOpen[pid];
  render();
  toast(money(Math.round(amt)) + ' applied to ' + hit.p.name + '.');
}
const TXN_PILLS = { paid: 'pill-green', scheduled: 'pill-navy', failed: 'pill-red', refunded: 'pill-gold' };
const TXN_NAMES = { paid: 'Paid', scheduled: 'Scheduled', failed: '⚠ Failed', refunded: 'Refunded' };
function buildTxnLog(s, d, t, p, colspan){
  const fee = playerFee(s, d, t, p);
  const paid = Math.min(p.paid || 0, fee);
  ensureTxns(s, d, t, p);
  reconcileFailed(s, d, t, p);
  const lines = p.txns.map(function(txn){
    if (editTxnId === txn.id){
      return `
      <div class="txn-line">
        <span class="pill ${TXN_PILLS[txn.status]}">${TXN_NAMES[txn.status]}</span>
        <span class="txn-label">${esc(txn.label)}</span>
        <span class="money-wrap"><input type="number" min="1" step="1" id="et-amt-${txn.id}" value="${txn.amount}"></span>
        <input type="text" id="et-date-${txn.id}" value="${esc(txn.date)}" placeholder="MM/DD/YYYY" style="max-width:120px">
        <button class="link-red" onclick="editTxnSave(${p.id}, ${txn.id})">Save</button>
        <button class="link-muted" onclick="removeTxn(${p.id}, ${txn.id})">Remove</button>
        <button class="link-muted" onclick="editTxnCancel()">Cancel</button>
      </div>`;
    }
    let action = '';
    if (txn.status === 'paid') action = `<button class="link-muted" onclick="refundTxn(${p.id}, ${txn.id})">Refund</button>`;
    if (txn.status === 'scheduled') action = `<button class="link-muted" onclick="editTxnStart(${txn.id})">Edit</button>`;
    if (txn.status === 'failed') action = `<button class="link-red" onclick="retryTxn(${p.id}, ${txn.id})">Retry Charge</button>`;
    return `
    <div class="txn-line">
      <span class="pill ${TXN_PILLS[txn.status]}">${TXN_NAMES[txn.status]}</span>
      <span class="txn-date">${esc(txn.date)}</span>
      <span class="txn-label">${esc(txn.label)}</span>
      ${(txn.method || txn.txId) ? `<span class="txn-meta">${esc([txn.method, txn.txId].filter(Boolean).join(' · '))}</span>` : ''}
      <span class="txn-amt">${money(txn.amount)}</span>
      ${action}
    </div>`;
  }).join('');
  const applyForm = applyOpen[p.id] ? `
    <div class="txn-line" style="border-top:1px solid var(--line)">
      <span class="txn-label">Apply Payment</span>
      <span class="money-wrap"><input type="number" min="1" step="1" id="ap-amt-${p.id}" placeholder="0"></span>
      <span class="txn-date">${todayStr()}</span>
      <button class="btn btn-primary btn-sm" onclick="applyPayment(${p.id})">Apply</button>
      <button class="link-muted" onclick="toggleApply(${p.id})">Cancel</button>
    </div>` : '';
  return `
  <tr><td colspan="${colspan}" class="no-label" style="padding:0">
    <div class="txn-wrap">
      <div class="txn-head">
        <span class="txn-title">Transaction Log — ${esc(p.name)}</span>
        <span class="txn-sum">Fee ${money(fee)} · Paid <b style="color:var(--green)">${money(paid)}</b> · Balance <b style="color:${fee - paid > 0 ? 'var(--red)' : 'var(--green)'}">${money(Math.max(0, fee - paid))}</b></span>
      </div>
      ${p.txns.length ? lines : '<p class="hint" style="padding:.4rem 0">No transactions yet.</p>'}
      ${applyForm}
      ${!applyOpen[p.id] ? `<div style="margin-top:.7rem"><button class="btn btn-outline-dark btn-sm" onclick="toggleApply(${p.id})">+ Apply Payment</button></div>` : ''}
    </div>
  </td></tr>`;
}
function renderPayRow(s, d, t, p, showTeam){
  const fee = playerFee(s, d, t, p);
  ensureTxns(s, d, t, p);
  reconcileFailed(s, d, t, p);
  const ft = playerFeeType(s, p);
  const paid = Math.min(p.paid || 0, fee);
  const bal = Math.max(0, fee - paid);
  const payPct = fee ? Math.round(paid / fee * 100) : 0;
  let status;
  if (p.payFailed) status = '<span class="pill pill-red">⚠ Failed</span>';
  else if (!p.registered) status = '<span class="pill pill-navy">Not Registered</span>';
  else if (paid >= fee && fee > 0) status = '<span class="pill pill-green">Paid</span>';
  else if (paid > 0) status = '<span class="pill pill-blue">Installments</span>';
  else status = '<span class="pill pill-red">Unpaid</span>';
  const open = openTxn[p.id];
  const cols = showTeam ? 7 : 6;
  return `
  <tr class="pay-row" onclick="toggleTxn(${p.id})">
    <td data-label="Player"><span style="color:var(--muted);margin-right:.35rem">${open ? '▾' : '▸'}</span><span class="cell-strong">${esc(p.name)}</span><div class="cell-sub" style="margin-left:1rem">${ft ? esc(ft.name) : '—'}</div></td>

    <td data-label="Plan">${p.plan === 'installments' ? 'Installments' : (p.plan === 'full' ? 'Paid in full' : '<span style="color:var(--muted)">—</span>')}</td>
    <td data-label="Fee">${money(fee)}</td>
    <td data-label="Paid">${p.registered ? `<span class="pay-cell"><span class="pay-ring ${p.payFailed ? 'failed' : ''}" style="--p:${payPct}" data-pct="${payPct}%"></span><span>${money(paid)}</span></span>` : money(paid)}</td>
    <td data-label="Balance">${bal ? money(bal) : '<span style="color:var(--green);font-weight:600">$0</span>'}</td>
    <td data-label="Status">${status}</td>
  </tr>
  ${open ? buildTxnLog(s, d, t, p, cols) : ''}`;
}

const AUDIENCES = { all: 'All Players', notreg: 'Not Registered', unpaid: 'Unpaid Balance', reg: 'Registered' };
function audienceList(s, d, t, aud){
  const r = t.roster || [];
  if (aud === 'notreg') return r.filter(p => !p.registered);
  if (aud === 'reg') return r.filter(p => p.registered);
  if (aud === 'unpaid') return r.filter(p => (p.paid || 0) < playerFee(s, d, t, p));
  return r;
}
function initCommsSel(s, d, t){

          <div style="margin-top:1rem"><label class="field-label">Message</label><textarea id="cm-body" placeholder="Write your message to the team…">${esc(commsDraft.body)}</textarea></div>

function sendTeamEmail(){
  const s = season();
  const t = s.teams.find(x => x.id === currentTeamId);
  const subject = document.getElementById('cm-subject').value.trim();
  const body = document.getElementById('cm-body').value.trim();

  if (!count){ toast('Pick at least one recipient.'); return; }
  t.comms = t.comms || [];
  t.comms.unshift({ when: new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' · ' + new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}), subject: subject, aud: commsAud, count: count });

const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtEventDates(ev){
  function parse(iso){ if (!iso) return null; const p = iso.split('-'); return { y:+p[0], m:+p[1], d:+p[2] }; }
  const a = parse(ev.start), b = parse(ev.end);
  if (!a && !b) return 'Dates TBD';
  if (a && !b) return MONTHS_SHORT[a.m-1] + ' ' + a.d + ', ' + a.y;
  if (a && b) return MONTHS_SHORT[a.m-1] + ' ' + a.d + ' – ' + MONTHS_SHORT[b.m-1] + ' ' + b.d + ', ' + b.y;
  return MONTHS_SHORT[b.m-1] + ' ' + b.d + ', ' + b.y;
}

/* Type-ahead: updates only the suggestion list so the input keeps focus */
function updateCoachSuggestions(v){
  coachSearch = v;
  const box = document.getElementById('coachSuggest');
  if (!box) return;
  const s = season();
  const t = s.teams.find(x => x.id === currentTeamId);
  const q = v.trim().toLowerCase();
  if (!q){ box.innerHTML = ''; return; }
  const onTeam = {};
  (t.staff || []).forEach(en => { onTeam[en.coachId] = true; });
  const matches = coachDirectory.filter(c => c.name.toLowerCase().includes(q) && !onTeam[c.id]).slice(0, 6);
  if (!matches.length){
    box.innerHTML = `
      <div class="pool-row" style="border-bottom:none">
        <span class="pool-sub">No coach named "${esc(v.trim())}" in the system yet.</span>
        <button class="link-red" onclick="manualCoachOpen=true;render()">+ Add them manually</button>
      </div>`;
    return;
  }
  box.innerHTML = matches.map(c => `
    <div class="pool-row">
      <span class="pool-name">${esc(c.name)}</span>
      ${c.registered ? '<span class="pill pill-green">In System</span>' : '<span class="pill pill-gold">Registration Pending</span>'}
      <button class="link-red tag" onclick="connectCoach(${c.id})">Connect</button>
    </div>`).join('');
}
function connectCoach(cid){
  const s = season();
  const t = s.teams.find(x => x.id === currentTeamId);
  const roleSel = document.getElementById('coach-role');
  const role = roleSel ? roleSel.value : 'head';
  t.staff.push({ id: nid(), coachId: cid, role: role });
  const c = coachDirectory.find(x => x.id === cid);
  coachSearch = ''; manualCoachOpen = false;
  render();
  toast((c ? c.name : 'Coach') + ' connected as ' + COACH_ROLES[role] + '.');
}
function addManualCoach(){
  const s = season();
  const t = s.teams.find(x => x.id === currentTeamId);
  const name = document.getElementById('mc-name').value.trim();
  const email = document.getElementById('mc-email').value.trim();
  const phone = document.getElementById('mc-phone').value.trim();
  if (!name){ toast('Coach name is required.'); return; }
  if (!email || !phone){ toast('Email and phone are required — that\'s how the registration invite reaches them.'); return; }
  const roleSel = document.getElementById('coach-role');
  const role = roleSel ? roleSel.value : 'head';
  const c = { id: nid(), name: name, email: email, phone: phone, registered: false };
  coachDirectory.push(c);
  t.staff.push({ id: nid(), coachId: c.id, role: role });
  coachSearch = ''; manualCoachOpen = false;
  render();
  toast(name + ' added — coach registration invite sent to ' + email + '.');
}
function editStaffRole(sid){ editStaffId = sid; render(); }
function saveStaffRole(sid){
  const s = season();
  const t = s.teams.find(x => x.id === currentTeamId);
  const en = (t.staff || []).find(x => x.id === sid);
  if (!en) return;
  const sel = document.getElementById('es-role-' + sid);
  const newRole = sel ? sel.value : en.role;
  const changed = newRole !== en.role;
  en.role = newRole;
  editStaffId = null;
  const c = coachDirectory.find(x => x.id === en.coachId);
  render();
  toast(changed ? (c ? c.name : 'Coach') + ' is now ' + COACH_ROLES[newRole] + '.' : 'No change made.');
}
function removeStaff(sid){
  const s = season();
  const t = s.teams.find(x => x.id === currentTeamId);
  t.staff = (t.staff || []).filter(x => x.id !== sid);
  render();

}

/* ---------- Season jerseys / uniform orders (interconnects with the Uniform Order Checklist) ---------- */
const SIZE_SETS = {
  apparel: ['YS','YM','YL','YXL','AS','AM','AL','AXL','AXXL'],
  sock: ['S','M','L','XL'],
  hat: ['6 3/4','6 7/8','7','7 1/8','7 1/4','7 3/8','7 1/2','7 5/8']
};
const JITEM_TYPES = { apparel: 'Apparel', sock: 'Sock', hat: 'Hat' };
/* Jersey package items are defined per season — the same package the season registration
   sells and the Uniform Order Checklist reads. Columns everywhere come from this list. */
function ensureJerseyItems(s){
  if (s.jerseyItems) return;
  s.jerseyItems = [
    { id: nid(), name: 'Navy Jersey', type: 'apparel' },
    { id: nid(), name: 'White Jersey', type: 'apparel' },
    { id: nid(), name: 'White Pant', type: 'apparel' },
    { id: nid(), name: 'Dry Fit', type: 'apparel' },
    { id: nid(), name: 'Sock', type: 'sock' },
    { id: nid(), name: 'Hat', type: 'hat' }
  ];
}
/* Registered players carry sizes from their registration; mock-seed deterministically */
function ensureJerseyData(s, p){
  p.sizes = p.sizes || {};
  if (p.jerseyPkg === undefined) p.jerseyPkg = p.registered ? (p.id % 7 !== 3) : false;
  if (p.ordered === undefined) p.ordered = false;
  if (p.registered && p.jerseyPkg){
    (s.jerseyItems || []).forEach(function(it){
      if (p.sizes[it.id]) return;
      const set = SIZE_SETS[it.type] || SIZE_SETS.apparel;
      p.sizes[it.id] = set[(p.id * 3 + it.id) % set.length];
    });
  }
}
function openSeasonJerseys(){
  const s = season();
  ensureJerseyItems(s);
  seasonJerseysOpen = true; seasonPayOpen = false;
  jerseyFilters = { team: 'all' }; sizeTotalsOpen = false;

}

function setSize(pid, itemId, v){
  const hit = findPlayerById(pid);
  if (!hit) return;
  hit.p.sizes = hit.p.sizes || {};
  if (v) hit.p.sizes[itemId] = v;
  else delete hit.p.sizes[itemId];
  if (sizeTotalsOpen) render();
}
function togglePkg(pid){
  const hit = findPlayerById(pid);
  if (!hit) return;
  hit.p.jerseyPkg = !hit.p.jerseyPkg;
  render();
  toast(hit.p.name + (hit.p.jerseyPkg ? ' now has a jersey package.' : ' marked as no jersey package — excluded from order totals.'));
}
function toggleOrdered(pid, checked){
  const hit = findPlayerById(pid);
  if (!hit) return;
  hit.p.ordered = !!checked;
}
function addJerseyItem(){
  const s = season();
  const name = document.getElementById('ji-name').value.trim();
  const type = document.getElementById('ji-type').value;
  if (!name){ toast('Give the item a name — e.g. "Red Jersey".'); return; }
  if (s.jerseyItems.some(it => it.name.toLowerCase() === name.toLowerCase())){ toast('That item is already in the package.'); return; }
  s.jerseyItems.push({ id: nid(), name: name, type: type });
  render();
  toast(name + ' added to the season jersey package — a column just appeared for every team.');
}
function removeJerseyItem(itemId){
  const s = season();
  const it = s.jerseyItems.find(x => x.id === itemId);
  s.jerseyItems = s.jerseyItems.filter(x => x.id !== itemId);
  s.teams.forEach(t => (t.roster || []).forEach(p => { if (p.sizes) delete p.sizes[itemId]; }));
  render();
  toast((it ? it.name : 'Item') + ' removed from the package for every team.');
}
/* Per-team Excel export: roster grid + size totals, ready for the vendor order */
function exportTeamExcel(teamId){
  const s = season();
  const t = s.teams.find(x => x.id === teamId);
  const items = s.jerseyItems || [];
  const rows = [];
  rows.push(['CBU Uniform Order — ' + s.name]);
  rows.push([t.name]);
  rows.push([]);
  rows.push(['Ordered', 'Jersey Pkg', '#', 'Player'].concat(items.map(it => it.name)));
  (t.roster || []).forEach(function(p){
    ensureJerseyData(s, p);
    rows.push([
      p.ordered ? 'Yes' : '',
      p.jerseyPkg ? 'Yes' : 'No',
      p.jersey || '',
      p.name
    ].concat(items.map(it => p.sizes[it.id] || '')));
  });
  rows.push([]);
  rows.push(['Size Totals (jersey-package players only)']);
  const totals = buildSizeTotals(s, [t]);
  items.forEach(function(it){
    const sizes = SIZE_SETS[it.type] || SIZE_SETS.apparel;
    const parts = sizes.filter(sz => totals[it.id][sz]).map(sz => sz + ' x' + totals[it.id][sz]);
    const itemTotal = sizes.reduce((n, sz) => n + (totals[it.id][sz] || 0), 0);
    rows.push([it.name, parts.join(', ') || '—', 'Total: ' + itemTotal]);
  });
  const fname = slugify(s.name) + '-' + slugify(t.name) + '-uniform-order';
  if (window.XLSX){
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:8},{wch:10},{wch:5},{wch:22}].concat(items.map(it => ({wch: Math.max(10, it.name.length + 2)})));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, t.name.replace(/[\\/?*\[\]:]/g, '').slice(0, 31) || 'Roster');
    XLSX.writeFile(wb, fname + '.xlsx');
    toast(t.name + ' uniform order exported to Excel.');
  } else {
    /* Fallback if the Excel library didn't load: CSV (opens in Excel) */
    const csv = rows.map(r => r.map(c => '"' + String(c == null ? '' : c).replace(/"/g, '""') + '"').join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = fname + '.csv';
    a.click();
    URL.revokeObjectURL(a.href);
    toast(t.name + ' exported as CSV (opens in Excel).');
  }
}
function buildSizeTotals(s, teams){
  const totals = {};
  (s.jerseyItems || []).forEach(it => { totals[it.id] = {}; });
  teams.forEach(function(t){
    (t.roster || []).forEach(function(p){
      ensureJerseyData(s, p);
      if (!p.jerseyPkg) return;                 /* no-package players excluded from order counts */
      (s.jerseyItems || []).forEach(function(it){
        const sz = p.sizes[it.id];
        if (!sz) return;
        totals[it.id][sz] = (totals[it.id][sz] || 0) + 1;
      });
    });
  });
  return totals;
}

  s.teams.forEach(t => (t.roster || []).forEach(function(p){

/* Build a mock roster with a mix of registered / in-progress / invited players */
function mockRoster(n, seed){
  const r = [];
  for (let i = 0; i < n; i++){
    const name = MOCK_FIRST[(i*5 + seed) % 16] + ' ' + MOCK_LAST[(i*7 + seed*3) % 16];
    const p = { id: nid(), name: name, pos: POSITIONS[(i*3 + seed) % 11],
      jersey: String((i*7 + seed*3) % 45 + 1),
      email: slugify(name) + '@email.com', phone: '(813) 555-0' + ('00' + (100 + i)).slice(-3),
      source: (i % 5 === 4) ? 'manual' : 'tryout', tryoutId: null,
      registered: false, completion: 0, plan: null, paid: 0 };
    const roll = (i + seed) % 10;
    if (roll < 5){ p.registered = true; p.completion = 100; p.plan = (roll % 2) ? 'installments' : 'full'; }
    else if (roll < 7){ p.registered = true; p.completion = 35 + roll * 8; p.plan = 'installments'; }
    r.push(p);
  }
  return r;
}
/* After rosters exist, set paid amounts from each player's actual fee */
function seedPayments(s){
  s.teams.forEach(t => {
    const d = s.divisions.find(x => x.id === t.divId);
    (t.roster || []).forEach(p => {
      if (!p.registered) return;
      const fee = playerFee(s, d, t, p);
      p.paid = (p.plan === 'full') ? fee : Math.round(fee * ((p.completion >= 100) ? 0.66 : 0.33));
    });
  });
}

      {id:nid(),divId:y12,name:'CBU Youth Navy',coach:'',players:0,overrides:{},roster:mockRoster(12,12),comms:[],record:{w:9,l:2,t:1},finishes:{first:1}},
      {id:nid(),divId:y14,name:'CBU Youth White',coach:'',players:0,overrides:{},roster:mockRoster(13,13),comms:[],record:{w:4,l:6,t:0},finishes:{}}
    ]
  };
  fallYouth.divisions[1].prices[ftY] = 895;   /* 12U override */
  fallYouth.divisions[2].prices[ftY] = 995;   /* 14U override */
  seedPayments(fallYouth);
  seasons = [summer, fallYouth];
  /* Tryout registrations available to each season (first one pre-connected) */
  summer.tryoutRegs = [
    { id: nid(), name: 'CBU Tampa Summer 2026 Tryout', status: 'active' },
    { id: nid(), name: 'CBU Jacksonville Summer 2026 Tryout', status: 'active' },
    { id: nid(), name: 'CBU Winter Prospect Camp', status: 'active' }
  ];
  summer.connectedTryouts = {};
  summer.connectedTryouts[summer.tryoutRegs[0].id] = true;
  fallYouth.tryoutRegs = [
    { id: nid(), name: 'CBU Youth Fall 2026 Tryout', status: 'active' },
    { id: nid(), name: 'CBU Youth Skills Camp', status: 'active' }
  ];
  fallYouth.connectedTryouts = {};
  fallYouth.connectedTryouts[fallYouth.tryoutRegs[0].id] = true;
  /* Jersey packages: summer runs three jerseys, youth runs two (mirrors the live Uniform Order Checklist) */
  summer.jerseyItems = [
    { id: nid(), name: 'Red Jersey', type: 'apparel' },
    { id: nid(), name: 'Navy Pin Jersey', type: 'apparel' },
    { id: nid(), name: 'White Jersey', type: 'apparel' },
    { id: nid(), name: 'Navy Pin Pant', type: 'apparel' },
    { id: nid(), name: 'White Pant', type: 'apparel' },

    { id: nid(), name: 'Sock', type: 'sock' },
    { id: nid(), name: 'Hat', type: 'hat' }
  ];

    { id: nid(), name: 'Sock', type: 'sock' },
    { id: nid(), name: 'Hat', type: 'hat' }
  ];
  /* Coach system directory: every sample head coach + a few extras to find via search */
  coachDirectory = [];
  function dirCoach(name, registered){
    const c = { id: nid(), name: name, email: slugify(name) + '@cbubaseball.com', phone: '(813) 555-03' + ('0' + coachDirectory.length).slice(-2), registered: registered };
    coachDirectory.push(c);
    return c;
  }
  [summer, fallYouth].forEach(function(se){
    se.teams.forEach(function(t){
      t.staff = [];
      if (t.coach){
        let c = coachDirectory.find(x => x.name === t.coach);
        if (!c) c = dirCoach(t.coach, true);
        t.staff.push({ id: nid(), coachId: c.id, role: 'head' });
      }
    });
  });
  const asst1 = dirCoach('Chris Fernandez', true);
  const asst2 = dirCoach('Ron Perez', true);

  menendez.staff.push({ id: nid(), coachId: asst2.id, role: 'assistant' });
